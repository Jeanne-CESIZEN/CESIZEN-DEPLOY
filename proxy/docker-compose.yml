# Services PARTAGÉS par les deux environnements (staging + prod) :
#   - Traefik    : reverse proxy unique, écoute 80/443, HTTPS Let's Encrypt
#   - Watchtower : unique, surveille TOUS les conteneurs labellisés et redéploie
#                  chacun selon son propre tag (:staging ou :prod)
#
# Pré-requis (une seule fois) :  docker network create web
# Démarrage          :  docker compose up -d

name: cesizen-proxy

services:
  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=web"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirection globale HTTP -> HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt (challenge HTTP)
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      # Dashboard / API Traefik activé (PAS en mode insecure : exposé via un
      # router HTTPS + authentification, voir labels ci-dessous)
      - "--api.dashboard=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      # Fichier d'utilisateurs basic-auth (htpasswd) — non interprété par compose,
      # donc AUCUN $ à échapper (voir README pour le générer)
      - "./auth/users:/auth/users:ro"
    labels:
      - "traefik.enable=true"
      # Router du dashboard : https://traefik.DOMAIN, protégé par auth basique
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=le"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      # Authentification basique via fichier (htpasswd)
      - "traefik.http.middlewares.dashboard-auth.basicauth.usersfile=/auth/users"
    networks:
      - web

  # Watchtower partagé : --label-enable => ne surveille que les conteneurs
  # portant le label com.centurylinklabs.watchtower.enable=true (api/front des
  # deux stacks). Chaque conteneur est comparé à son propre tag d'image.
  watchtower:
    image: nickfedor/watchtower
    restart: unless-stopped
    command: --interval 60 --cleanup --label-enable
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      # Identifiants GHCR pour pull des images privées (voir README)
      - "${HOME}/.docker/config.json:/config.json:ro"

networks:
  web:
    external: true
